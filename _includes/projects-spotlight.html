<section id="research" class="spotlight-section">
<div class="container">
<h2 class="section-title">Research</h2>

<div class="spotlight" id="spotlight">
  <div class="spot-stage" id="spot-stage"></div>
  <button class="spot-nav spot-prev" type="button" aria-label="Previous project">‹</button>
  <button class="spot-nav spot-next" type="button" aria-label="Next project">›</button>
</div>
<div class="spot-dots" id="spot-dots"></div>

<a href="/research" class="section-link">More about our research →</a>
</div>
</section>

<script>
(function(){
  // ====== EDIT PROJECTS HERE (image + title + blurb + link) ======
  var PROJECTS = [
    { img:"/static/img/research/synaptic_diversity.svg",
      title:"Diversity of Synaptic Neurotransmission",
      blurb:"Tracing when and how synaptic machinery arose — well before the emergence of neurons — across animals and their relatives, using phylogenetics and single-cell data." },
    { img:"/static/img/research/cell_type_evolution.svg",
      title:"Cell Type Evolution",
      blurb:"Building cross-species cell atlases to trace how neuronal cell types originated and diversified across animals." },
    { img:"/static/img/research/gpcr_evolution.svg",
      title:"Olfactory System Evolution",
      blurb:"How olfactory GPCR repertoires expanded and diversified, with protein language models to predict receptor–odorant interactions." },
    { img:"/static/img/research/glutamate.svg",
      title:"Glutamate Signaling Evolution",
      blurb:"Reconstructing the evolutionary history of glutamate receptor families and their expression across cell types and species." }
  ];
  var LINK = "/research";   // where each slide links to
  var INTERVAL = 6000;      // ms between auto-advances
  // ===============================================================

  var stage = document.getElementById('spot-stage');
  var dotsWrap = document.getElementById('spot-dots');
  var spotlight = document.getElementById('spotlight');
  if(!stage) return;

  PROJECTS.forEach(function(p, i){
    var slide = document.createElement('a');
    slide.className = 'spot-slide' + (i===0?' active':'');
    slide.href = LINK;
    slide.innerHTML =
      '<div class="spot-img"><img src="'+p.img+'" alt="'+p.title+'" onerror="this.style.display=\'none\'"></div>' +
      '<div class="spot-text"><h3>'+p.title+'</h3><p>'+p.blurb+'</p><span class="spot-more">Learn more →</span></div>';
    stage.appendChild(slide);
    var dot = document.createElement('button');
    dot.className = 'spot-dot' + (i===0?' active':'');
    dot.type = 'button';
    dot.setAttribute('aria-label', 'Project '+(i+1));
    dot.addEventListener('click', function(){ go(i); });
    dotsWrap.appendChild(dot);
  });

  var slides = stage.querySelectorAll('.spot-slide');
  var dots = dotsWrap.querySelectorAll('.spot-dot');
  var idx = 0, n = PROJECTS.length, timer = null;

  function setHeight(){ stage.style.height = slides[idx].offsetHeight + 'px'; }
  function render(){
    for(var i=0;i<slides.length;i++){
      slides[i].classList.toggle('active', i===idx);
      dots[i].classList.toggle('active', i===idx);
    }
    setHeight();
  }
  function go(i){ idx = (i+n)%n; render(); restart(); }
  function next(){ go(idx+1); }
  function prev(){ go(idx-1); }
  function restart(){ if(timer) clearInterval(timer); timer = setInterval(next, INTERVAL); }

  document.querySelector('.spot-next').addEventListener('click', function(e){ e.preventDefault(); next(); });
  document.querySelector('.spot-prev').addEventListener('click', function(e){ e.preventDefault(); prev(); });
  spotlight.addEventListener('mouseenter', function(){ if(timer) clearInterval(timer); });
  spotlight.addEventListener('mouseleave', restart);
  window.addEventListener('resize', setHeight);

  render();
  // recompute height once images/fonts have settled
  window.addEventListener('load', setHeight);
  setTimeout(setHeight, 300);
  restart();
})();
</script>

<style>
.spotlight {
  position: relative;
}
.spot-stage {
  position: relative;
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  min-height: 260px;
  transition: height 0.45s ease, box-shadow 0.35s ease, border-color 0.35s ease;
}
.spotlight:hover .spot-stage {
  box-shadow: 0 16px 44px -8px rgba(101, 44, 144, 0.30);
  border-color: #d9c7ee;
}
.spot-slide {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  display: grid;
  grid-template-columns: 1.05fr 1fr;
  align-items: center;
  gap: 1.5rem;
  color: inherit;
  text-decoration: none;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s ease;
}
.spot-slide.active { opacity: 1; pointer-events: auto; }
.spot-slide:hover { text-decoration: none; }
.spot-img {
  align-self: stretch;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-alt);
  padding: 1.75rem;
}
.spot-img img { max-width: 100%; max-height: 210px; height: auto; object-fit: contain; }
.spot-text { padding: 1.75rem 1.9rem 1.75rem 0; }
.spot-text h3 { font-size: 1.35rem; color: var(--primary); margin-bottom: 0.6rem; }
.spot-text p { color: var(--text-light); line-height: 1.6; margin-bottom: 0.9rem; }
.spot-more { color: var(--primary); font-weight: 600; font-size: 0.9rem; }
.spot-slide:hover .spot-more { color: var(--primary-hover); }

/* discrete arrows — only visible on hover */
.spot-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 34px; height: 34px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(2px);
  color: var(--text);
  font-size: 1.4rem; line-height: 1;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.25s ease, background 0.2s ease;
  z-index: 3;
}
.spot-prev { left: 10px; }
.spot-next { right: 10px; }
.spotlight:hover .spot-nav { opacity: 0.85; }
.spot-nav:hover { opacity: 1 !important; background: #fff; color: var(--primary); }

.spot-dots { display: flex; gap: 0.5rem; margin-top: 1rem; }
.spot-dot {
  width: 8px; height: 8px; border-radius: 50%;
  border: none; background: var(--border); cursor: pointer; padding: 0;
  transition: background 0.2s, transform 0.2s;
}
.spot-dot.active { background: var(--primary); transform: scale(1.3); }

@media (max-width: 768px) {
  .spot-slide { grid-template-columns: 1fr; gap: 0; }
  .spot-img { padding: 1.25rem; }
  .spot-img img { max-height: 150px; }
  .spot-text { padding: 1.25rem; }
  .spot-text h3 { font-size: 1.15rem; }
  .spot-nav { display: none; }
}
</style>
