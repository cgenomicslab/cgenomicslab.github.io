<div class="timeline-section">
<h3 class="subsection-title">Lab Timeline</h3>

<div class="timeline-legend" id="timeline-legend"></div>

<div class="timeline-container" id="timeline-container"></div>
<div class="timeline-axis" id="timeline-axis"></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var members = [
        {% assign all_people = site.members | sort: "startdate" %}
        {% for member in all_people %}
        {
            name: "{{ member.name | split: ' ' | first }}",
            fullName: "{{ member.name }}",
            // One segment per role. A member with a `roles:` list in their front
            // matter (position changed over time, e.g. MSc → PhD) gets one bar per
            // role; otherwise a single segment from the top-level position/dates.
            segments: [
                {% if member.roles %}
                {% for r in member.roles %}
                {
                    position: "{{ r.position }}",
                    startdate: "{{ r.startdate | date: '%Y-%m-%d' }}",
                    enddate: "{{ r.enddate | date: '%Y-%m-%d' }}"
                }{% unless forloop.last %},{% endunless %}
                {% endfor %}
                {% else %}
                {
                    position: "{{ member.position }}",
                    startdate: "{{ member.startdate | date: '%Y-%m-%d' }}",
                    enddate: "{{ member.enddate | date: '%Y-%m-%d' }}"
                }
                {% endif %}
            ]
        }{% unless forloop.last %},{% endunless %}
        {% endfor %}
    ];

    // Convenience fields derived from the segments (used for sorting/legend).
    members.forEach(function(m){
        m.segments = (m.segments || []).filter(function(s){ return s.startdate; });
        m.startdate = m.segments.length ? m.segments[0].startdate : '';
        m.position = m.segments.length ? m.segments[0].position : '';
    });

    // Group Leader first, then by start date (earliest first)
    members.sort(function(a, b){
      var ga = /group leader|principal investigator/i.test(a.position) ? 0 : 1;
      var gb = /group leader|principal investigator/i.test(b.position) ? 0 : 1;
      if(ga !== gb) return ga - gb;
      return (a.startdate || '').localeCompare(b.startdate || '');
    });

    var container = document.getElementById('timeline-container');
    var axis = document.getElementById('timeline-axis');
    if(!container) return;

    var startYear = 2024;
    var now = new Date();
    var nowIndex = (now.getFullYear() - startYear) * 12 + now.getMonth(); // 0-based current month
    var totalMonths = nowIndex + 1;                                       // extend to current month

    // Ordered category definitions (previous palette). Legend shows only those present.
    var categories = [
        { label: 'Group Leader',  color: '#B9375E', test: function(p){ return p.includes('group leader') || p.includes('principal investigator') || p.includes(' pi'); } },
        { label: 'Postdoc',       color: '#BE9A60', test: function(p){ return p.includes('postdoc'); } },
        { label: 'PhD',           color: '#e9c46a', test: function(p){ return p.includes('phd'); } },
        { label: 'MSc',           color: '#CEDDBB', test: function(p){ return p.includes('msc') || p.includes('master'); } },
        { label: 'Undergraduate', color: '#FFE0E9', test: function(p){ return p.includes('undergraduate') || p.includes('bsc'); } }
    ];

    function getColor(position) {
        var pos = position.toLowerCase();
        for (var i = 0; i < categories.length; i++) {
            if (categories[i].test(pos)) return categories[i].color;
        }
        return '#434343';
    }

    // Build legend from categories actually present among the people
    var legend = document.getElementById('timeline-legend');
    if (legend) {
        var present = {};
        members.forEach(function(m){
            m.segments.forEach(function(seg){
                var pos = (seg.position || '').toLowerCase();
                for (var i = 0; i < categories.length; i++) {
                    if (categories[i].test(pos)) { present[i] = true; break; }
                }
            });
        });
        var lh = '';
        categories.forEach(function(c, i){
            if (present[i]) lh += '<span><span class="legend-box" style="background:' + c.color + ';"></span>' + c.label + '</span>';
        });
        legend.innerHTML = lh;
    }

    function render(){
        var isMobile = window.innerWidth <= 600;
        var nameW = isMobile ? 88 : 104;
        var dateW = isMobile ? 0 : 140;
        var availWidth = Math.max(container.offsetWidth - nameW - dateW, 120);
        var ppm = availWidth / totalMonths;

        function monthIndex(dateStr, fallbackMonth){
            var p = dateStr.split('-');
            return (parseInt(p[0]) - startYear) * 12 + ((parseInt(p[1]) || fallbackMonth) - 1);
        }

        var html = '';
        members.forEach(function(member) {
            if (!member.segments.length) return;

            var bars = '';
            var overallStart = null, lastEnd = null, openEnded = false;
            member.segments.forEach(function(seg) {
                if (!seg.startdate) return;
                var startIdx = monthIndex(seg.startdate, 1);
                var endIdx, segEndLabel;
                if (seg.enddate) {
                    endIdx = monthIndex(seg.enddate, 12);
                    segEndLabel = seg.enddate.substring(0, 7);
                } else {
                    endIdx = nowIndex;
                    segEndLabel = 'present';
                    openEnded = true;
                }
                var startOffset = Math.max(startIdx, 0) * ppm;
                var endOffset = (endIdx + 1) * ppm;
                var barWidth = Math.max(endOffset - startOffset, 6);
                var color = getColor(seg.position);
                var segLabel = seg.startdate.substring(0, 7) + ' – ' + segEndLabel;
                bars += '<div class="timeline-bar" style="background:' + color + ';left:' + startOffset + 'px;width:' + barWidth + 'px;" title="' + member.fullName + ' — ' + seg.position + ': ' + segLabel + '"></div>';

                if (overallStart === null) overallStart = seg.startdate;
                lastEnd = seg.enddate ? seg.enddate.substring(0, 7) : null;
            });

            var dateLabel = overallStart.substring(0, 7) + ' – ' + (openEnded || !lastEnd ? 'present' : lastEnd);
            html += '<div class="timeline-row">';
            html += '<div class="timeline-name">' + member.name + '</div>';
            html += '<div class="timeline-bar-container">' + bars + '</div>';
            html += '<div class="timeline-date">' + dateLabel + '</div>';
            html += '</div>';
        });
        container.innerHTML = html;

        // axis: a small tick per month, taller tick + label each January
        axis.style.marginLeft = nameW + 'px';
        axis.style.marginRight = dateW + 'px';
        var a = '';
        for (var m = 0; m <= totalMonths; m++) {
            var x = m * ppm;
            var yearStart = (m % 12 === 0);
            a += '<div class="axis-tick' + (yearStart ? ' axis-tick-year' : '') + '" style="left:' + x + 'px;"></div>';
            if (yearStart) a += '<span class="axis-year" style="left:' + x + 'px;">' + (startYear + m / 12) + '</span>';
        }
        axis.innerHTML = '<div class="axis-inner">' + a + '</div>';
    }

    render();
    var t;
    window.addEventListener('resize', function(){ clearTimeout(t); t = setTimeout(render, 150); });
});
</script>
