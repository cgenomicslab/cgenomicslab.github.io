{% if site.data.interns.size > 0 %}
<div class="alumni-section">
<h3 class="subsection-title">Interns</h3>
<div class="interns-list">
{% for intern in site.data.interns %}
<div class="intern-item">
{% if intern.url %}<a href="{{ intern.url }}">{{ intern.name }}</a>{% else %}<span class="intern-name">{{ intern.name }}</span>{% endif %}
{% if intern.origin %}<span class="intern-origin">{{ intern.origin }}</span>{% endif %}
</div>
{% endfor %}
</div>
</div>
{% endif %}
